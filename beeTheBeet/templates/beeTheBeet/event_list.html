{% extends "beeTheBeet/base.html" %}
{% block title %}Events{% endblock %}
{% block content %}
  <div class="page">
    <h1>Events</h1>
    <p><a href="{% url 'event_new' %}">New event</a></p>
    <ul>
      {% for evt in events %}
        <li><a href="{% url 'event_detail' evt.pk %}">{{ evt.title }}</a></li>
      {% empty %}
        <li>No events yet.</li>
      {% endfor %}
    </ul>
  </div>
{% endblock %}
