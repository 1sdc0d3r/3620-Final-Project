{% extends "beeTheBeet/base.html" %}
{% block title %}New Event{% endblock %}
{% block content %}
  <form method="post" action="">
    {% csrf_token %}
    <h1>New Event</h1>
    {% for field in form %}
      <div class="form-control {% if field.errors %}errors{% endif %}">
        {{ field.label_tag }}
        {{ field }}
        {{ field.errors }}
      </div>
    {% endfor %}
    <button type="submit">Save</button>
  </form>
  <p class="after-form"><a href="{% url 'event_list' %}">Cancel</a></p>
{% endblock %}
